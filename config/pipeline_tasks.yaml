tasks:
- name: trade_calendar
  source: tushare
  data_type: trade_cal
  symbols: []
  start_date: '20150101'
  extra:
    exchange: SSE
  retry: 2
  retry_delay: 5
  validate:
    required:
    - date
    - is_open
    dedup_keys:
    - date
  completeness:
    check_gaps: true
  target:
    type: sqlserver
    table: trade_calendar
    if_exists: replace
    keys:
    - date
- name: etf_basic
