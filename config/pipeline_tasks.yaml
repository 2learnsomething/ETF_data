- name: fund_portfolio
  source: tushare
  data_type: fund_portfolio
  symbols:
  - 510050.SH
  - 510300.SH
  - 510500.SH
  - 159919.SZ
  - 159915.SZ
  - 588000.SH
  start_date: '20240101'
  incremental: true
  lookback_days: 90
  retry: 3
  retry_delay: 10
  # 注意: fund_portfolio 返回 ts_code(基金) + symbol(持仓股票),
  # 需要 transform 避免 normalize_columns 把 ts_code→symbol 冲突
  transform:
  - action: rename
    mapping:
      ts_code: fund_code
      end_date: date
  validate:
    required:
    - fund_code
    - date
    dedup_keys:
    - fund_code
    - date
    - symbol
  target:
    type: sqlserver
    table: fund_portfolio
    if_exists: append
    keys:
    - fund_code
    - date
    - symbol
