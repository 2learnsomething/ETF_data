# ============================================================
# ETF 数据源配置 — 行情 / 基本面 / 实时
# ============================================================
# 分层:
#   Tier 0: AmazingData（主源，付费 + 本地 Parquet 缓存兜底）
#   Tier 1: 免费 + 稳定 (已验证)
#   Tier 2: 免费有限制 / 需注册
#   Tier 3: 付费
#
# 管线回退链 (按数据维度):
#   K 线:       AmazingData → Tushare → AKShare(东财) → 腾讯 → Baostock
#   复权因子:   Tushare → Baostock
#   净值:       AmazingData → Tushare → AKShare
#   基本信息:   AmazingData → Tushare → AKShare
#   交易日历:   AmazingData → Tushare → Baostock
#   指数日线:   Tushare → AKShare(东财) → Baostock
#   分钟K线:    AmazingData → 腾讯 → Baostock
# ============================================================

sources:

  # ── Tier 0: 主源（付费 + 本地缓存） ──────────────────
  tier0:

    - name: AmazingData
      type: proprietary_sdk + parquet
      tier: 0
      capabilities:
        - ETF K 线 (日/1分/5分)
        - ETF 净值
        - ETF 基本信息
        - 代码清单
      auth: 账号密码
      status: 主源，BSD 管道直连，本地 Parquet 即时重放
      note: 失败后按 pipeline 的 fallback_sources 链依次降级

  # ── Tier 1: 已验证可用的免费源 ──────────────────────
  tier1:

    - name: Tushare Pro
      type: python_lib + http_api
      url: https://tushare.pro
      tier: 1
      capabilities:
        - ETF 日线 (fund_daily)
        - ETF 净值 (fund_nav)
        - ETF 复权因子 (fund_adj)
        - ETF 份额 (fund_share)
        - ETF 基本信息 (fund_basic)
        - ETF 持仓明细 (fund_portfolio)
        - 涨跌停 (stk_limit)
        - 指数日线 (index_daily)
        - 交易日历 (trade_cal)
      rate_limit: 200积分/min (免费)
      auth: 需注册 token
      status: 主力备源，服务器不稳需超时60s

    - name: AKShare 东方财富
      type: http_api (curl 直连)
      base_url: push2his.eastmoney.com
      tier: 1
      response_time: ~76ms
      capabilities:
        - ETF 日K线 (push2his)
        - ETF 实时行情 (push2)
        - 指数日线 (push2his)
        - ETF 分类 (新浪)
        - ETF 分红 (新浪)
      rate_limit: 宽松
      auth: none
      status: 第二备源，curl 子进程绕过 Python SSL 兼容问题

    - name: 腾讯财经 (Tencent)
      type: http_api (curl 直连)
      base_url: https://web.ifzq.gtimg.cn
      tier: 1
      response_time: ~1067ms
      capabilities:
        - ETF 日K线 (前复权)
        - ETF 分时数据 (当日)
      rate_limit: 宽松
      auth: none
      status: 第三备源，内置自动重试，价格差异约5.5%

    - name: Baostock
      type: python_lib
      tier: 1
      capabilities:
        - ETF 日K线
        - 指数日K线
        - 复权因子
        - A 股日线/分钟线
        - 交易日历
      auth: 免费注册
      status: 第四备源，底层数据稳定

    - name: 同花顺
      type: akshare
      capabilities:
        - ETF 实时净值行情 (fund_etf_spot_ths)
        - ETF 分类 (fund_etf_category_ths)
      auth: none
      status: 同花顺估值数据写入SQL Server

    - name: 上证所
      type: akshare
      capabilities:
        - ETF 场内规模 (fund_etf_scale_sse)
      auth: none
      status: 593只ETF规模数据写入SQL Server

  # ── Tier 2: 需安装/注册 ─────────────────────────────
  tier2:

    - name: AData
      type: python_lib
      capabilities:
        - ETF K 线
        - 交易日历
        - 股票数据
      auth: 免费注册即可使用
      status: 免费、稳定，可作为补充备源

    - name: Baostock
      type: python_lib
      capabilities:
        - 股票日K线
        - 股票分钟K线
      auth: 免费注册
      status: 已在 Tier 1 启用

    - name: efinance
      type: python_lib
      capabilities:
        - ETF 日K线 (东方财富封装)
      auth: none
      status: 当前网络不可达(DNS)，在 AmazingData UnifiedFetcher 中作为备源

  # ── Tier 3: 付费 ────────────────────────────────────
  tier3:
    - name: Wind (万得)
    - name: Choice (东方财富)
    - name: QMT (迅投)
    - name: XTP (中泰证券)
